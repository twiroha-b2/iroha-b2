<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iroha B2 業績分析</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080c14; color: #e8e4df; font-family: 'Noto Sans TC','PingFang TC',sans-serif; min-height:100vh; }
.header { background: linear-gradient(160deg,#0d1829,#0a1420); border-bottom:1px solid rgba(245,166,35,0.2); padding:16px; }
.brand { font-size:9px; color:#f5a623; letter-spacing:4px; margin-bottom:4px; }
.title { font-size:20px; font-weight:800; margin-bottom:10px; }
.tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
.btn { padding:4px 14px; border-radius:20px; font-size:12px; font-weight:700; cursor:pointer; border:1px solid rgba(245,166,35,0.35); background:transparent; color:#f5a623; }
.btn.active { background:#f5a623; color:#080c14; border-color:#f5a623; }
.vbtn { padding:4px 10px; border-radius:14px; font-size:11px; cursor:pointer; border:1px solid rgba(245,166,35,0.25); background:transparent; color:#f5a623; }
.vbtn.active { background:#f5a623; color:#080c14; font-weight:700; }
.content { padding:14px; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.kpi { background:rgba(255,255,255,0.04); border-radius:12px; padding:12px; }
.kpi-l { font-size:9px; letter-spacing:2px; margin-bottom:4px; }
.kpi-v { font-size:18px; font-weight:800; }
.kpi-s { font-size:9px; color:rgba(232,228,223,0.45); margin-top:2px; }
.card { background:rgba(255,255,255,0.04); border-radius:12px; border:1px solid rgba(255,255,255,0.08); overflow:hidden; margin-bottom:10px; }
.ch { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.06); font-size:10px; color:#f5a623; letter-spacing:2px; display:flex; justify-content:space-between; align-items:center; }
.cb { max-height:500px; overflow-y:auto; }
.row { padding:9px 12px; border-bottom:1px solid rgba(255,255,255,0.04); }
.row:nth-child(even){background:rgba(255,255,255,0.02);}
.bar-w { height:5px; background:rgba(255,255,255,0.07); border-radius:3px; margin-top:4px; }
.bar { height:100%; border-radius:3px; }
.prog-w { height:10px; background:rgba(255,255,255,0.08); border-radius:5px; overflow:hidden; margin:8px 0; }
.prog { height:100%; border-radius:5px; }
.fb { display:flex; justify-content:space-between; align-items:center; }
.tag { font-size:10px; padding:1px 5px; border-radius:6px; }
.up{color:#34d399;} .dn{color:#f87171;}
select { background:rgba(255,255,255,0.07); border:1px solid rgba(78,205,196,0.4); color:#4ecdc4; padding:5px 10px; border-radius:10px; font-size:13px; cursor:pointer; }
.loading { text-align:center; padding:40px; color:#f5a623; font-size:15px; }
.err { text-align:center; padding:20px; color:#f87171; font-size:13px; line-height:1.8; }
table { width:100%; border-collapse:collapse; }
td { padding:9px 10px; border-bottom:1px solid rgba(255,255,255,0.04); font-size:12px; }
tr:nth-child(even) td { background:rgba(255,255,255,0.02); }
</style>
</head>
<body>
<!-- 密碼畫面 -->
<div id="pwScreen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#080c14">
  <div style="text-align:center;padding:40px">
    <div style="font-size:9px;color:#f5a623;letter-spacing:4px;margin-bottom:8px">IROHA · B2 店</div>
    <div style="font-size:22px;font-weight:800;margin-bottom:6px">業績分析報告</div>
    <div style="font-size:12px;color:rgba(232,228,223,0.45);margin-bottom:30px">請輸入密碼</div>
    <input id="pwInput" type="password" placeholder="••••••••"
      style="width:200px;padding:12px 16px;border-radius:12px;border:1px solid rgba(245,166,35,0.4);background:rgba(255,255,255,0.07);color:#e8e4df;font-size:18px;text-align:center;letter-spacing:4px;display:block;margin:0 auto 12px"/>
    <button onclick="checkPassword()"
      style="width:200px;padding:12px;border-radius:12px;background:#f5a623;color:#080c14;font-weight:800;font-size:14px;border:none;cursor:pointer">
      進入
    </button>
    <div id="pwError" style="display:none;margin-top:10px;color:#f87171;font-size:12px">密碼錯誤，請重試</div>
  </div>
</div>

<!-- 主要內容 -->
<div id="mainApp" style="display:none">
<div class="header">
  <div class="brand">IROHA · B2 店</div>
  <div class="title">業績分析報告</div>
  <div class="tabs" id="mTabs"></div>
  <div class="tabs" id="vTabs"></div>
</div>
<div class="content" id="app"><div class="loading">📊 載入數據中...</div></div>

<script>
// 密碼保護
const PASSWORD = '3834387';
function checkPassword(){
  const input = document.getElementById('pwInput').value;
  if(input === PASSWORD){
    document.getElementById('pwScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    load();
  } else {
    document.getElementById('pwError').style.display='block';
    setTimeout(()=>document.getElementById('pwError').style.display='none',2000);
  }
}
document.addEventListener('keydown', e=>{ if(e.key==='Enter'&&document.getElementById('pwScreen').style.display!=='none') checkPassword(); });

const SHEET_ID = '1WNhwfDF8oN0xU3stcSXC0zh_94kZneipLDHccru2CEo';
const DOW = ['日','一','二','三','四','五','六'];
const CFG = {
  '202601':{target:1000000,dl:0},'202602':{target:1000000,dl:0},
  '202603':{target:1000000,dl:0},'202604':{target:1000000,dl:0},
  '202605':{target:1000000,dl:35.5},'202606':{target:1000000,dl:0},
  '202607':{target:1000000,dl:0},'202608':{target:1000000,dl:0},
};
let DATA={}, SEL='', VIEW='dashboard', CMP='', CMPS=[];

const fmt=n=>Math.round(n).toLocaleString();
const fmtD=d=>`${d.slice(4,6)}/${d.slice(6,8)}`;
const getWD=d=>new Date(`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`).getDay();
const pct=(a,b)=>b?Math.round(a/b*100):0;
function calcDay([r11,c11,r15,c15,r21,c21]){
  return {
    b:{rev:r11,cust:c11},
    l:{rev:r15-r11,cust:c15-c11},
    d:{rev:r21-r15,cust:c21-c15},
    t:{rev:r21,cust:c21}
  };
}
function getDays(m){ return Object.keys(DATA).filter(d=>d.startsWith(m)).sort().map(d=>({date:d,...calcDay(DATA[d])})); }

async function load(){
  // Use JSON API with CORS proxy
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
  try {
    const res = await fetch(url);
    const text = await res.text();
    // Strip Google's wrapper
    const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}')+1));
    const rows = json.table.rows;
    DATA = {};
    rows.forEach(row => {
      if(!row.c || !row.c[0] || !row.c[0].v) return;
      const dateRaw = row.c[0].v;
      // Parse date - could be "Date(2026,4,1)" or "2026/05/01"
      let dateKey = '';
      if(typeof dateRaw === 'string' && dateRaw.startsWith('Date(')) {
        const parts = dateRaw.replace('Date(','').replace(')','').split(',');
        const y = parts[0], m = String(parseInt(parts[1])+1).padStart(2,'0'), d = String(parseInt(parts[2])).padStart(2,'0');
        dateKey = `${y}${m}${d}`;
      } else {
        dateKey = String(dateRaw).replace(/\//g,'').replace(/-/g,'');
      }
      if(dateKey.length !== 8) return;
      const vals = [1,2,3,4,5,6].map(i => row.c[i] ? (parseInt(row.c[i].v)||0) : 0);
      if(vals[4] > 0) DATA[dateKey] = vals;
    });
    const months = [...new Set(Object.keys(DATA).map(d=>d.slice(0,6)))].sort();
    if(!months.length){ document.getElementById('app').innerHTML='<div class="err">試算表內沒有數據，請確認格式正確</div>'; return; }
    SEL = months[months.length-1];
    renderTabs(months);
    render();
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="err">
      ❌ 載入失敗<br><br>
      請確認：<br>
      1. 試算表已設定「知道連結的人可以檢視」<br>
      2. 試算表第一行標題為：date, r11, c11, r15, c15, r21, c21<br>
      3. 日期格式為：2026/05/01<br><br>
      <small style="color:rgba(232,228,223,0.4)">${e.message}</small>
    </div>`;
  }
}

function renderTabs(months){
  document.getElementById('mTabs').innerHTML = months.map(m=>
    `<button class="btn ${m===SEL?'active':''}" onclick="SEL='${m}';renderTabs([...new Set(Object.keys(DATA).map(d=>d.slice(0,6)))].sort());render()">${parseInt(m.slice(4,6))}月</button>`
  ).join('');
  document.getElementById('vTabs').innerHTML = [['dashboard','總覽'],['daily','每日明細'],['period','時段分析'],['weekday','星期分析'],['compare','比較']].map(([v,l])=>
    `<button class="vbtn ${VIEW===v?'active':''}" onclick="VIEW='${v}';renderTabs([...new Set(Object.keys(DATA).map(d=>d.slice(0,6)))].sort());render()">${l}</button>`
  ).join('');
}

function render(){
  const days = getDays(SEL);
  const cfg = CFG[SEL]||{target:1000000,dl:0};
  const dim = new Date(parseInt(SEL.slice(0,4)),parseInt(SEL.slice(4,6)),0).getDate();
  const mn = parseInt(SEL.slice(4,6));
  const tRev=days.reduce((s,d)=>s+d.t.rev,0);
  const tCust=days.reduce((s,d)=>s+d.t.cust,0);
  const tBrk=days.reduce((s,d)=>s+d.b.rev,0);
  const tLun=days.reduce((s,d)=>s+d.l.rev,0);
  const tDin=days.reduce((s,d)=>s+d.d.rev,0);
  const avgSpend=tCust?Math.round(tRev/tCust):0;
  const avgDay=days.length?Math.round(tRev/days.length):0;
  const tPct=pct(tRev,cfg.target);
  const remDays=dim-days.length;
  const need=remDays>0?Math.round((cfg.target-tRev)/remDays):0;
  const dTarget=Math.round(cfg.target/dim);
  const lEff=cfg.dl?Math.round(avgDay/cfg.dl):0;
  const maxRev=days.length?Math.max(...days.map(d=>d.t.rev)):1;
  const maxD=days.length?days.reduce((a,b)=>a.t.rev>b.t.rev?a:b):null;
  const minD=days.length?days.reduce((a,b)=>a.t.rev<b.t.rev?a:b):null;
  let h='';

  if(VIEW==='dashboard'){
    h+=`<div style="background:rgba(245,166,35,0.07);border-radius:14px;border:1px solid rgba(245,166,35,0.2);padding:14px;margin-bottom:12px">
      <div class="fb" style="margin-bottom:8px">
        <span style="font-size:10px;color:#f5a623;letter-spacing:2px">月目標達標進度</span>
        <span style="font-size:22px;font-weight:800;color:${tPct>=100?'#34d399':'#f5a623'}">${tPct}%</span>
      </div>
      <div class="prog-w"><div class="prog" style="width:${Math.min(tPct,100)}%;background:${tPct>=100?'linear-gradient(90deg,#34d399,#10b981)':'linear-gradient(90deg,#f5a623,#f97316)'}"></div></div>
      <div class="fb" style="font-size:11px">
        <span style="color:rgba(232,228,223,0.45)">實際 <b style="color:#e8e4df">$${fmt(tRev)}</b></span>
        <span style="color:rgba(232,228,223,0.45)">目標 <b style="color:#e8e4df">$${fmt(cfg.target)}</b></span>
      </div>
      ${remDays>0?`<div style="margin-top:8px;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:8px;font-size:11px">
        剩 <b>${remDays}天</b>，每日需達 <b style="color:${need>dTarget?'#f87171':'#34d399'}">$${fmt(need)}</b>
        <span style="color:rgba(232,228,223,0.45)">（日均目標$${fmt(dTarget)}）</span>
      </div>`:''}
    </div>
    <div class="grid2">
      ${[[`${mn}月總營業額`,`$${fmt(tRev)}`,'#f5a623',`${days.length}天累計`],['月總來客數',`${fmt(tCust)}人`,'#4ecdc4',`日均${fmt(Math.round(tCust/(days.length||1)))}人`],['日均營業額',`$${fmt(avgDay)}`,'#a78bfa',`目標$${fmt(dTarget)}`],['平均客單價',`$${fmt(avgSpend)}`,'#f87171','每位客人消費']].map(([l,v,c,s])=>
      `<div class="kpi" style="border:1px solid ${c}22"><div class="kpi-l" style="color:${c}">${l}</div><div class="kpi-v">${v}</div><div class="kpi-s">${s}</div></div>`).join('')}
    </div>
    ${lEff?`<div class="card" style="border-color:rgba(167,139,250,0.2)"><div class="ch" style="color:#a78bfa">人效分析</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px;text-align:center">
      ${[['日均人力',`${cfg.dl}h`],['月總時數',`${fmt(cfg.dl*dim)}h`],['人效',`$${fmt(lEff)}/h`]].map(([l,v])=>`<div><div style="font-size:9px;color:rgba(232,228,223,0.45);margin-bottom:4px">${l}</div><div style="font-size:15px;font-weight:800;color:#a78bfa">${v}</div></div>`).join('')}
    </div></div>`:''}
    <div class="card"><div class="ch">三餐時段業績佔比</div><div style="padding:12px">
      ${[['🌅 早餐','07:30-11:00',tBrk,'#f5a623'],['☀️ 午餐','11:00-15:00',tLun,'#60a5fa'],['🌙 晚餐','15:00-21:30',tDin,'#a78bfa']].map(([l,t,v,c])=>`
      <div style="margin-bottom:10px">
        <div class="fb" style="margin-bottom:4px">
          <span style="font-size:12px">${l} <span style="font-size:9px;color:rgba(232,228,223,0.45)">${t}</span></span>
          <div><span style="color:rgba(232,228,223,0.45);font-size:11px;margin-right:8px">${pct(v,tRev)}%</span><b style="color:${c}">$${fmt(v)}</b></div>
        </div>
        <div class="bar-w"><div class="bar" style="width:${pct(v,tRev)}%;background:${c}"></div></div>
      </div>`).join('')}
    </div></div>
    ${maxD&&minD?`<div class="grid2">
      ${[[maxD,'🏆 最高','#f5a623'],[minD,'📉 最低','#f87171']].map(([d,l,c])=>`<div class="kpi" style="border:1px solid ${c}22"><div class="kpi-l" style="color:${c}">${l}</div><div class="kpi-v" style="font-size:15px">$${fmt(d.t.rev)}</div><div class="kpi-s">${fmtD(d.date)} 週${DOW[getWD(d.date)]} · ${d.t.cust}人</div></div>`).join('')}
    </div>`:''}`;
  }

  else if(VIEW==='daily'){
    h+=`<div class="card"><div class="ch">${mn}月 每日業績明細</div><div class="cb">`;
    if(!days.length) h+=`<div style="padding:20px;text-align:center;color:rgba(232,228,223,0.45)">尚無數據</div>`;
    days.forEach(d=>{
      const isW=getWD(d.date)===5||getWD(d.date)===6;
      const hit=d.t.rev>=dTarget;
      h+=`<div class="row">
        <div class="fb" style="margin-bottom:5px">
          <div style="display:flex;align-items:center;gap:5px">
            <b style="font-size:13px">${fmtD(d.date)}</b>
            <span class="tag" style="color:${isW?'#f5a623':'rgba(232,228,223,0.4)'};background:${isW?'rgba(245,166,35,0.15)':'transparent'}">週${DOW[getWD(d.date)]}</span>
            ${hit?`<span class="tag" style="color:#34d399;background:rgba(52,211,153,0.12)">達標</span>`:''}
          </div>
          <div style="display:flex;gap:7px;align-items:center">
            <span style="font-size:10px;color:#4ecdc4">${d.t.cust}人</span>
            <span style="font-size:10px;color:rgba(232,228,223,0.4)">均$${Math.round(d.t.rev/d.t.cust)}</span>
            <b style="color:#f5a623">$${fmt(d.t.rev)}</b>
          </div>
        </div>
        <div style="display:flex;gap:2px;height:5px;border-radius:3px;overflow:hidden">
          <div style="flex:${d.b.rev};background:#f5a623;opacity:0.8"></div>
          <div style="flex:${d.l.rev};background:#60a5fa"></div>
          <div style="flex:${d.d.rev};background:#a78bfa"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px;font-size:9px">
          <span style="color:#f5a623">早$${fmt(d.b.rev)}</span>
          <span style="color:#60a5fa">午$${fmt(d.l.rev)}</span>
          <span style="color:#a78bfa">晚$${fmt(d.d.rev)}</span>
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  }

  else if(VIEW==='period'){
    [['🌅 早餐','07:30-11:00','b','#f5a623'],['☀️ 午餐','11:00-15:00','l','#60a5fa'],['🌙 晚餐','15:00-21:30','d','#a78bfa']].forEach(([title,time,key,color])=>{
      const vals=days.map(d=>d[key].rev);
      const mx=Math.max(...vals,1);
      const tot=vals.reduce((a,b)=>a+b,0);
      const avg=vals.length?Math.round(tot/vals.length):0;
      h+=`<div class="card" style="border-color:${color}22"><div class="ch"><span style="color:${color}">${title} <span style="font-size:9px;color:rgba(232,228,223,0.45)">${time}</span></span><span style="color:${color}">$${fmt(tot)} <span style="font-size:9px;color:rgba(232,228,223,0.45)">均$${fmt(avg)}/日</span></span></div><div class="cb">`;
      days.forEach(d=>{
        const v=d[key].rev, c=d[key].cust;
        h+=`<div class="row"><div class="fb" style="font-size:11px;margin-bottom:3px"><span style="color:rgba(232,228,223,0.6)">${fmtD(d.date)} 週${DOW[getWD(d.date)]}</span><div><span style="color:rgba(232,228,223,0.4);margin-right:8px">${c}人</span><b style="color:${color}">$${fmt(v)}</b></div></div><div class="bar-w"><div class="bar" style="width:${v/mx*100}%;background:${color};opacity:0.8"></div></div></div>`;
      });
      h+=`</div></div>`;
    });
  }

  else if(VIEW==='weekday'){
    const dows=Array(7).fill(null).map(()=>({r:[],c:[],b:[],l:[],d:[]}));
    days.forEach(d=>{const w=getWD(d.date);dows[w].r.push(d.t.rev);dows[w].c.push(d.t.cust);dows[w].b.push(d.b.rev);dows[w].l.push(d.l.rev);dows[w].d.push(d.d.rev);});
    const avg=dows.map(d=>({R:d.r.length?Math.round(d.r.reduce((a,b)=>a+b)/d.r.length):0,C:d.c.length?Math.round(d.c.reduce((a,b)=>a+b)/d.c.length):0,B:d.b.length?Math.round(d.b.reduce((a,b)=>a+b)/d.b.length):0,L:d.l.length?Math.round(d.l.reduce((a,b)=>a+b)/d.l.length):0,D:d.d.length?Math.round(d.d.reduce((a,b)=>a+b)/d.d.length):0,n:d.r.length}));
    const mx=Math.max(...avg.map(d=>d.R),1);
    h+=`<div class="card"><div class="ch">${mn}月 星期平均業績</div>`;
    [1,2,3,4,5,6,0].filter(w=>avg[w].n>0).sort((a,b)=>avg[b].R-avg[a].R).forEach((dow,rank)=>{
      const isW=dow===5||dow===6;
      h+=`<div class="row">
        <div class="fb" style="margin-bottom:6px">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:22px;height:22px;border-radius:50%;background:${rank<3?'#f5a623':'rgba(255,255,255,0.1)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${rank<3?'#080c14':'#e8e4df'}">${rank+1}</div>
            <b style="font-size:14px;color:${isW?'#f5a623':'#e8e4df'}">週${DOW[dow]}</b>
            <span style="font-size:10px;color:rgba(232,228,223,0.45)">${avg[dow].n}天</span>
          </div>
          <div style="text-align:right"><div style="font-size:13px;font-weight:700;color:#f5a623">$${fmt(avg[dow].R)}</div><div style="font-size:10px;color:#4ecdc4">均${avg[dow].C}人</div></div>
        </div>
        <div class="bar-w"><div class="bar" style="width:${avg[dow].R/mx*100}%;background:${isW?'#f5a623':'rgba(245,166,35,0.45)'}"></div></div>
        <div style="display:flex;gap:8px;margin-top:5px;font-size:9px">
          <span style="color:#f5a623">早$${fmt(avg[dow].B)}</span>
          <span style="color:#60a5fa">午$${fmt(avg[dow].L)}</span>
          <span style="color:#a78bfa">晚$${fmt(avg[dow].D)}</span>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }

  else if(VIEW==='compare'){
    const months=[...new Set(Object.keys(DATA).map(d=>d.slice(0,6)))].sort();
    const COLORS=['#f5a623','#4ecdc4','#a78bfa','#f87171','#34d399','#60a5fa','#fb923c','#e879f9'];
    
    // Month selector checkboxes
    h+=`<div class="card" style="margin-bottom:12px">
      <div class="ch">選擇比較月份（可多選）</div>
      <div style="padding:12px;display:flex;gap:8px;flex-wrap:wrap">
        ${months.map((m,i)=>{
          const isSelected = CMPS.includes(m);
          const color = COLORS[months.indexOf(m)%COLORS.length];
          return `<button onclick="toggleCmp('${m}')" style="padding:6px 14px;border-radius:16px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid ${isSelected?color:'rgba(255,255,255,0.15)'};background:${isSelected?color+'22':'transparent'};color:${isSelected?color:'rgba(232,228,223,0.5)'}">
            ${parseInt(m.slice(4,6))}月
          </button>`;
        }).join('')}
      </div>
    </div>`;

    if(CMPS.length===0){
      h+=`<div style="padding:20px;text-align:center;color:rgba(232,228,223,0.45);background:rgba(255,255,255,0.04);border-radius:12px">請選擇要比較的月份</div>`;
    } else {
      // Build data for each selected month
      const selData = CMPS.map((m,i)=>{
        const mDays=getDays(m);
        const mCfg=CFG[m]||{target:1000000,dl:0};
        const mRev=mDays.reduce((s,d)=>s+d.t.rev,0);
        const mCust=mDays.reduce((s,d)=>s+d.t.cust,0);
        const mBrk=mDays.reduce((s,d)=>s+d.b.rev,0);
        const mLun=mDays.reduce((s,d)=>s+d.l.rev,0);
        const mDin=mDays.reduce((s,d)=>s+d.d.rev,0);
        return {
          m, mn:parseInt(m.slice(4,6)), color:COLORS[months.indexOf(m)%COLORS.length],
          rev:mRev, cust:mCust, brk:mBrk, lun:mLun, din:mDin, n:mDays.length,
          avgRev:mDays.length?Math.round(mRev/mDays.length):0,
          avgSpend:mCust?Math.round(mRev/mCust):0,
          targetPct:pct(mRev,mCfg.target),
          eff:mCfg.dl&&mDays.length?Math.round((mRev/mDays.length)/mCfg.dl):0,
          cfg:mCfg
        };
      });

      // KPI comparison table
      h+=`<div class="card" style="margin-bottom:10px">
        <div class="ch">數據對比</div>
        <div style="overflow-x:auto">
        <table style="min-width:100%">
          <tr style="background:rgba(255,255,255,0.04)">
            <td style="padding:8px 10px;font-size:10px;color:rgba(232,228,223,0.45)">項目</td>
            ${selData.map(d=>`<td style="padding:8px 10px;font-size:11px;font-weight:700;color:${d.color};text-align:center">${d.mn}月</td>`).join('')}
          </tr>
          ${[
            ['💰 總營業額', d=>`$${fmt(d.rev)}`],
            ['👥 總來客數', d=>`${fmt(d.cust)}人`],
            ['📅 有效天數', d=>`${d.n}天`],
            ['📊 日均營業額', d=>`$${fmt(d.avgRev)}`],
            ['🧾 客單價', d=>`$${fmt(d.avgSpend)}`],
            ['🎯 達標率', d=>`${d.targetPct}%`],
            ['👷 人效/h', d=>d.eff?`$${fmt(d.eff)}`:'—'],
          ].map(([label,fn])=>`
          <tr>
            <td style="padding:8px 10px;font-size:11px;color:rgba(232,228,223,0.45)">${label}</td>
            ${selData.map(d=>{
              const val=fn(d);
              const maxVal=Math.max(...selData.map(x=>parseFloat(fn(x).replace(/[^0-9.]/g,''))||0));
              const numVal=parseFloat(val.replace(/[^0-9.]/g,''))||0;
              const isMax=numVal===maxVal&&maxVal>0;
              return `<td style="padding:8px 10px;font-size:12px;font-weight:700;color:${isMax?d.color:'#e8e4df'};text-align:center">${val}${isMax?' 🏆':''}</td>`;
            }).join('')}
          </tr>`).join('')}
        </table>
        </div>
      </div>`;

      // Revenue bar chart
      const maxRev=Math.max(...selData.map(d=>d.rev),1);
      h+=`<div class="card" style="margin-bottom:10px">
        <div class="ch">月總營業額比較</div>
        <div style="padding:12px">
          ${selData.map(d=>`
          <div style="margin-bottom:10px">
            <div class="fb" style="font-size:12px;margin-bottom:4px">
              <span style="color:${d.color};font-weight:700">${d.mn}月</span>
              <span style="color:${d.color};font-weight:700">$${fmt(d.rev)}</span>
            </div>
            <div class="bar-w"><div class="bar" style="width:${d.rev/maxRev*100}%;background:${d.color}"></div></div>
          </div>`).join('')}
        </div>
      </div>`;

      // 三餐比較
      h+=`<div class="card" style="margin-bottom:10px">
        <div class="ch">三餐時段比較</div>
        <div style="padding:12px">
          ${[['🌅 早餐','brk'],['☀️ 午餐','lun'],['🌙 晚餐','din']].map(([label,key])=>{
            const maxV=Math.max(...selData.map(d=>d[key]),1);
            return `<div style="margin-bottom:14px">
              <div style="font-size:11px;color:rgba(232,228,223,0.6);margin-bottom:6px">${label}</div>
              ${selData.map(d=>`
              <div style="margin-bottom:5px">
                <div class="fb" style="font-size:11px;margin-bottom:2px">
                  <span style="color:${d.color}">${d.mn}月</span>
                  <span style="color:${d.color}">$${fmt(d[key])} (${pct(d[key],d.rev)}%)</span>
                </div>
                <div class="bar-w"><div class="bar" style="width:${d[key]/maxV*100}%;background:${d.color};opacity:0.8"></div></div>
              </div>`).join('')}
            </div>`;
          }).join('')}
        </div>
      </div>`;

      // 星期比較
      h+=`<div class="card">
        <div class="ch">星期平均業績比較</div>
        <div style="padding:12px">
          ${[1,2,3,4,5,6,0].map(w=>{
            const dowVals=selData.map(d=>{
              const wDays=getDays(d.m).filter(day=>getWD(day.date)===w);
              return wDays.length?Math.round(wDays.reduce((s,day)=>s+day.t.rev,0)/wDays.length):0;
            });
            if(dowVals.every(v=>v===0))return'';
            const maxV=Math.max(...dowVals,1);
            return `<div style="margin-bottom:12px">
              <div style="font-size:11px;font-weight:700;margin-bottom:5px">週${DOW[w]}</div>
              ${selData.map((d,i)=>dowVals[i]?`
              <div style="margin-bottom:4px">
                <div class="fb" style="font-size:10px;margin-bottom:2px">
                  <span style="color:${d.color}">${d.mn}月</span>
                  <span style="color:${d.color}">$${fmt(dowVals[i])}</span>
                </div>
                <div class="bar-w" style="height:4px"><div class="bar" style="width:${dowVals[i]/maxV*100}%;background:${d.color}"></div></div>
              </div>`:'').join('')}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }
  }

  document.getElementById('app').innerHTML = h;
}

function toggleCmp(m){
  const i=CMPS.indexOf(m);
  if(i>=0) CMPS.splice(i,1);
  else CMPS.push(m);
  render();
}
setInterval(load, 300000);
</script>
</div>
</body>
</html>
